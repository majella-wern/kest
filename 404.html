<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Majella - Loading</title>
  <style>
    body { 
      margin: 0; padding: 0; 
      background: #0a0a0a; 
      color: #fff; 
      font-family: Arial; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
    }
  </style>
</head>
<body>
  <div style="text-align: center;">
    <h1>🌿 Majella</h1>
    <p>Loading your page...</p>
  </div>
  <script>
    // FIXED - No infinite loop
    const path = window.location.pathname;
    if (path !== '/kest/' && !path.includes('/kest/book')) {
      window.history.replaceState(null, null, '/kest/');
    }
    // Load React app
    document.body.innerHTML = '<div id="root"></div>';
    const script = document.createElement('script');
    script.src = '/kest/assets/index-[hash].js'; // Your actual JS file
    document.head.appendChild(script);
  </script>
</body>
</html>
